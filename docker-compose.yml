services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mbuzzi
      POSTGRES_PASSWORD: mbuzzi
      POSTGRES_DB: mbuzzi
    ports:
      - '5432:5432'
    volumes:
      - mbuzzi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mbuzzi -d mbuzzi']
      interval: 3s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://mbuzzi:mbuzzi@db:5432/mbuzzi
      PORT: '3001'
    depends_on:
      db:
        condition: service_healthy

volumes:
  mbuzzi_pgdata:
