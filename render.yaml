# Render Blueprint: connect this repo in the Render dashboard (New → Blueprint).
# Docs: https://render.com/docs/infrastructure-as-code
#
# If deploy logs show ENOTFOUND dpg-... : the API expands bare internal hosts to
# <host>.<RENDER_DATABASE_REGION>-postgres.render.com. Keep RENDER_DATABASE_REGION in
# sync with databases.region (frankfurt, oregon, singapore, ohio, virginia).
# Optional: set DATABASE_EXTERNAL_URL to the full External URL from Postgres → Connect.

databases:
  - name: mbuzzi-postgres
    databaseName: mbuzzi
    user: mbuzzi
    plan: free
    # Must match your web service region so the private DATABASE_URL works.
    region: frankfurt

services:
  - type: web
    name: mbuzzi-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: api
    # NODE_ENV=production during build skips devDependencies unless we include them.
    # TypeScript lives in devDependencies, so this line is required for `tsc`.
    buildCommand: npm install --include=dev && npm run build && npm prune --omit=dev
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22.14.0"
      # Same region slug as `databases.region` above (fixes ENOTFOUND on internal dpg-…-a host).
      - key: RENDER_DATABASE_REGION
        value: frankfurt
      # Do not set NODE_ENV here — it can break the build (see buildCommand).
      # Render sets NODE_ENV=production at runtime for web services.
      - key: DATABASE_URL
        fromDatabase:
          name: mbuzzi-postgres
          property: connectionString
