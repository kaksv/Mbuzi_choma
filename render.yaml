# Render Blueprint: connect this repo in the Render dashboard (New → Blueprint).
# Docs: https://render.com/docs/infrastructure-as-code
#
# RENDER_DATABASE_REGION must match the *Postgres* region (dashboard), not necessarily
# the web service region. If they differ (API Frankfurt + DB Oregon), use the DB region
# here so the dpg-… hostname expands to *.oregon-postgres.render.com (or whichever).
# Optional: DATABASE_EXTERNAL_URL = full External URL from Postgres → Connect.

databases:
  - name: mbuzzi-postgres
    databaseName: mbuzzi
    user: mbuzzi
    plan: free
    region: oregon

services:
  - type: web
    name: mbuzzi-api
    runtime: node
    region: oregon
    plan: free
    rootDir: api
    # NODE_ENV=production during build skips devDependencies unless we include them.
    # TypeScript lives in devDependencies, so this line is required for `tsc`.
    buildCommand: npm install --include=dev && npm run build && npm prune --omit=dev
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22.14.0"
      # Postgres region from dashboard (yours is Oregon; API can stay in Frankfurt).
      - key: RENDER_DATABASE_REGION
        value: oregon
      # Do not set NODE_ENV here — it can break the build (see buildCommand).
      # Render sets NODE_ENV=production at runtime for web services.
      - key: DATABASE_URL
        fromDatabase:
          name: mbuzzi-postgres
          property: connectionString
      # Product images: DB holds public_ids; set to your Cloudinary cloud name (Dashboard).
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: ADMIN_API_KEY
        sync: false
