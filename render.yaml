# Render Blueprint: connect this repo in the Render dashboard (New → Blueprint).
# Adjust region/plan names to match your Render account.
# Docs: https://render.com/docs/infrastructure-as-code

databases:
  - name: mbuzzi-postgres
    databaseName: mbuzzi
    user: mbuzzi
    plan: free

services:
  - type: web
    name: mbuzzi-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: api
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mbuzzi-postgres
          property: connectionString
